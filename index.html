<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>いべぢ 口コミ</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #13131a;
    --accent: #ff4d6d;
    --accent2: #ffb703;
    --text: #f0f0f0;
    --muted: #888;
    --border: rgba(255,255,255,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ヘッダー */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 16px 20px;
    background: linear-gradient(to bottom, rgba(10,10,15,0.95), transparent);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 900;
    font-size: 1.4rem;
    letter-spacing: 0.05em;
  }

  .logo span {
    color: var(--accent);
  }

  .badge {
    background: var(--accent);
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.08em;
  }

  /* メインフィード */
  #feed {
    padding-top: 70px;
    padding-bottom: 40px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ローディング */
  #loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    gap: 16px;
    color: var(--muted);
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* カード */
  .card {
    margin: 0 0 2px 0;
    background: var(--card);
    position: relative;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* 写真エリア */
  .card-image {
    width: 100%;
    aspect-ratio: 4/5;
    object-fit: cover;
    display: block;
    background: #1a1a24;
  }

  .card-image.no-image {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
  }

  /* 店名バッジ */
  .store-badge {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    color: var(--accent2);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    padding: 6px 14px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }

  /* カード下部 */
  .card-body {
    padding: 16px 20px 20px;
    border-bottom: 1px solid var(--border);
  }

  .card-comment {
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 10px;
  }

  .card-date {
    font-size: 0.75rem;
    color: var(--muted);
  }

  /* 空状態 */
  #empty {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    gap: 12px;
    color: var(--muted);
    text-align: center;
    padding: 20px;
  }

  #empty .icon { font-size: 3rem; }
  #empty p { font-size: 0.9rem; line-height: 1.6; }

  /* フィルター */
  #filter-bar {
    position: sticky;
    top: 60px;
    z-index: 90;
    padding: 10px 16px;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(10px);
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }

  #filter-bar::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.8rem;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-weight: 700;
  }

  /* 更新ボタン */
  #refresh-btn {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: white;
    font-size: 1.3rem;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,77,109,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    z-index: 100;
  }

  #refresh-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 24px rgba(255,77,109,0.5);
  }

  #refresh-btn.spinning { animation: spin 0.8s linear infinite; }

  /* カード数 */
  #count {
    text-align: center;
    padding: 12px;
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<header>
  <div class="logo">いべぢ<span>。</span></div>
  <div class="badge">口コミ</div>
</header>

<div id="filter-bar">
  <button class="filter-btn active" data-store="all" onclick="filterStore('all', this)">すべて</button>
</div>

<div id="feed">
  <div id="loading">
    <div class="spinner"></div>
    <p>読み込み中...</p>
  </div>
  <div id="empty">
    <div class="icon">📸</div>
    <p>まだ投稿がありません<br>最初の口コミを投稿してみよう！</p>
  </div>
  <div id="count"></div>
  <div id="cards"></div>
</div>

<button id="refresh-btn" onclick="loadData()" title="更新">↻</button>

<script>
  // ★ここを自分のスプレッドシートIDに変える★
  const SHEET_ID = '1w6rzT7QxCfY9ounhKptAKqhqMEMQH0NgVdDLVCvpy08';
  const SHEET_NAME = 'フォームの回答 1'; // シート名が違う場合は変更

  let allData = [];
  let currentStore = 'all';

  async function loadData() {
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');

    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

    try {
      const res = await fetch(url);
      const text = await res.text();
      // Googleの独自ラッパーを除去
      const json = JSON.parse(text.substring(47, text.length - 2));
      const rows = json.table.rows;

      allData = rows.map(row => ({
        date:    row.c[0]?.v || '',
        store:   row.c[1]?.v || '不明',
        comment: row.c[2]?.v || '',
        photo:   row.c[3]?.v || '',
      })).reverse(); // 新しい順

      buildFilters();
      renderCards(allData);
    } catch (e) {
      console.error(e);
      document.getElementById('loading').innerHTML = '<p style="color:#ff4d6d">データの読み込みに失敗しました</p>';
    } finally {
      btn.classList.remove('spinning');
    }
  }

  function buildFilters() {
    const stores = [...new Set(allData.map(d => d.store))];
    const bar = document.getElementById('filter-bar');
    // 既存ボタンをすべて削除して再生成
    bar.innerHTML = `<button class="filter-btn ${currentStore==='all'?'active':''}" data-store="all" onclick="filterStore('all',this)">すべて</button>`;
    stores.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (currentStore === s ? ' active' : '');
      btn.dataset.store = s;
      btn.textContent = s;
      btn.onclick = () => filterStore(s, btn);
      bar.appendChild(btn);
    });
  }

  function filterStore(store, btn) {
    currentStore = store;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = store === 'all' ? allData : allData.filter(d => d.store === store);
    renderCards(filtered);
  }

  function renderCards(data) {
    const container = document.getElementById('cards');
    const loading   = document.getElementById('loading');
    const empty     = document.getElementById('empty');
    const count     = document.getElementById('count');

    loading.style.display = 'none';

    if (data.length === 0) {
      empty.style.display = 'flex';
      container.innerHTML = '';
      count.textContent = '';
      return;
    }

    empty.style.display = 'none';
    count.textContent = `${data.length} 件の口コミ`;

    container.innerHTML = data.map((d, i) => {
      const photoHtml = d.photo
        ? `<img class="card-image" src="${escapeHtml(d.photo)}" alt="投稿写真" loading="lazy" onerror="this.style.display='none'">`
        : `<div class="card-image no-image">📷</div>`;

      return `
        <div class="card" style="animation-delay:${i * 0.05}s">
          <div style="position:relative">
            ${photoHtml}
            <div class="store-badge">${escapeHtml(d.store)}</div>
          </div>
          <div class="card-body">
            <p class="card-comment">${escapeHtml(d.comment)}</p>
            <p class="card-date">${formatDate(d.date)}</p>
          </div>
        </div>`;
    }).join('');
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function formatDate(raw) {
    if (!raw) return '';
    // Googleシートの日付形式 "Date(2024,10,3,12,0,0)" を処理
    const m = String(raw).match(/Date\((\d+),(\d+),(\d+)/);
    if (m) {
      const d = new Date(+m[1], +m[2], +m[3]);
      return d.toLocaleDateString('ja-JP', { month: 'long', day: 'numeric' });
    }
    return String(raw).slice(0, 10);
  }

  loadData();
</script>
</body>
</html>
